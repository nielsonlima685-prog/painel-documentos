<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibrador Técnico de Precisão</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Contentor principal que simula o espaço físico do documento */
        #canvas-documento {
            position: relative;
            width: 740px;  /* Proporção horizontal otimizada para o modelo lado a lado */
            height: 260px; 
            background-color: #21262d;
            border: 2px solid #30363d;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        /* Estilização corrigida para evitar caixas grandes ou deformadas */
        .caixa-arrastavel {
            position: absolute;
            background-color: rgba(56, 139, 253, 0.3) !important;
            border: 1px solid #58a6ff !important;
            color: #ffffff !important;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 9px !important;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            user-select: none;
            touch-action: none;
            border-radius: 3px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: background-color 0.2s, border-color 0.2s;
        }
        /* Estado quando o bloco é selecionado para ajuste via teclado */
        .caixa-arrastavel.selecionada {
            background-color: rgba(46, 160, 67, 0.4) !important;
            border: 1px solid #3fb950 !important;
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
            z-index: 50;
        }
        .texto-etiqueta {
            padding: 0 4px;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
            <div>
                <h1 class="text-xl font-bold text-white">Ajuste de Layout Dinâmico</h1>
                <p class="text-xs text-gray-400">Arrasta as etiquetas ou seleciona uma e usa as setas do teclado (↑ ↓ ← →) para ajuste milimétrico.</p>
            </div>
            <div id="status-painel" class="text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-blue-400 font-mono">
                Inicializando...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-gray-900 p-4 rounded-lg border border-gray-800 flex flex-col h-[500px]">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Campos de Dados</h2>
                <div id="lista-campos" class="space-y-2 overflow-y-auto flex-1 pr-1">
                    </div>
            </div>

            <div class="lg:col-span-3 flex flex-col justify-center items-center bg-black p-6 rounded-lg border border-gray-800 min-h-[500px]">
                <div id="canvas-documento">
                    </div>
                <div class="mt-4 flex gap-4 text-xs text-gray-500 font-mono">
                    <span>🟢 Bloco Verde = Selecionado para Teclado</span>
                    <span>• Escala ativa baseada em .fields</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tipoDocumento = urlParams.get('tipo') || 'rg';

        const canvas = document.getElementById('canvas-documento');
        const listaCampos = document.getElementById('lista-campos');
        const statusPainel = document.getElementById('status-painel');

        let mapaLayout = {};
        let blocoSelecionado = null;

        // 1. Carregar estrutura do Servidor
        async function buscarConfiguracao() {
            try {
                const response = await fetch(`/api/coords?tipo=${tipoDocumento}`);
                mapaLayout = await response.json();
                
                statusPainel.innerText = "Configuração carregada com sucesso.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-green-400 font-mono";
                
                renderizarPainel();
            } catch (err) {
                statusPainel.innerText = "Erro ao carregar mapa de dados.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-red-400 font-mono";
            }
        }

        // 2. Renderização Corrigida com Filtro de Tamanho
        function renderizarPainel() {
            canvas.innerHTML = '';
            listaCampos.innerHTML = '';

            // Garante o acesso à propriedade interna 'fields' se o JSON estiver encapsulado
            const campos = mapaLayout.fields || mapaLayout;

            Object.keys(campos).forEach(chave => {
                const configCampo = campos[chave];
                if (configCampo.x === undefined || configCampo.y === undefined) return;

                // Encurta visualmente strings longas para não quebrar a caixa no ecrã
                const rotuloVisivel = chave.replace('frente_', 'F_').replace('verso_', 'V_').toUpperCase();

                // Criar Bloco Arrastável
                const bloco = document.createElement('div');
                bloco.className = 'caixa-arrastavel';
                bloco.id = `bloco-${chave}`;
                bloco.setAttribute('data-key', chave);
                bloco.innerHTML = `<span class="texto-etiqueta">${rotuloVisivel}</span>`;
                
                // Define limites visuais estritos para evitar distorções
                bloco.style.width = `${configCampo.w || 90}px`;
                bloco.style.height = `${configCampo.h || 14}px`;
                bloco.style.left = `${configCampo.x}px`;
                bloco.style.top = `${configCampo.y}px`;

                canvas.appendChild(bloco);

                // Criar Item na Lista Lateral
                const item = document.createElement('div');
                item.className = 'bg-gray-950 p-2.5 rounded border border-gray-800 text-xs flex flex-col gap-1 hover:border-gray-700 cursor-pointer';
                item.onclick = () => focarBloco(bloco);
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-300 font-mono break-all pr-1">${chave}</span>
                        <span id="txt-coord-${chave}" class="text-blue-400 font-mono font-bold whitespace-nowrap">X:${configCampo.x} Y:${configCampo.y}</span>
                    </div>
                    <span class="text-[10px] text-gray-500 italic truncate">${configCampo.description || 'Sem descrição.'}</span>
                `;
                listaCampos.appendChild(item);
            });

            configurarInteracao();
        }

        // 3. Ativação do Drag & Drop via Interact.js
        function configurarInteracao() {
            interact('.caixa-arrastavel').draggable({
                inertia: false,
                modifiers: [
                    interact.modifiers.restrictRect({
                        restriction: 'parent',
                        endOnly: false
                    })
                ],
                autoScroll: false,
                listeners: {
                    start(event) {
                        focarBloco(event.target);
                    },
                    move(event) {
                        const target = event.target;
                        const chave = target.getAttribute('data-key');

                        let x = parseFloat(target.style.left) || 0;
                        let y = parseFloat(target.style.top) || 0;

                        x += event.dx;
                        y += event.dy;

                        target.style.left = `${x}px`;
                        target.style.top = `${y}px`;

                        const displayCoord = document.getElementById(`txt-coord-${chave}`);
                        if (displayCoord) displayCoord.innerText = `X:${Math.round(x)} Y:${Math.round(y)}`;
                    },
                    end(event) {
                        const target = event.target;
                        const chave = target.getAttribute('data-key');
                        const xFinal = Math.round(parseFloat(target.style.left));
                        const yFinal = Math.round(parseFloat(target.style.top));

                        persistirCoordenada(chave, xFinal, yFinal);
                    }
                }
            });
        }

        // 4. Seleção e Foco de Elementos
        function focarBloco(elemento) {
            if (blocoSelecionado) {
                blocoSelecionado.classList.remove('selecionada');
            }
            blocoSelecionado = elemento;
            blocoSelecionado.classList.add('selecionada');
        }

        // 5. Mecânica de Ajuste Fino por Teclado (Setas)
        document.addEventListener('keydown', (e) => {
            if (!blocoSelecionado) return;

            const setas = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (!setas.includes(e.key)) return;

            e.preventDefault(); // Impede o scroll da janela externa

            let x = Math.round(parseFloat(blocoSelecionado.style.left)) || 0;
            let y = Math.round(parseFloat(blocoSelecionado.style.top)) || 0;
            const chave = blocoSelecionado.getAttribute('data-key');

            if (e.key === 'ArrowUp') y -= 1;
            if (e.key === 'ArrowDown') y += 1;
            if (e.key === 'ArrowLeft') x -= 1;
            if (e.key === 'ArrowRight') x += 1;

            blocoSelecionado.style.left = `${x}px`;
            blocoSelecionado.style.top = `${y}px`;

            const displayCoord = document.getElementById(`txt-coord-${chave}`);
            if (displayCoord) displayCoord.innerText = `X:${x} Y:${y}`;

            persistirCoordenada(chave, x, y);
        });

        // 6. Enviar Alteração para o Backend de Forma Segura
        async function persistirCoordenada(chave, x, y) {
            statusPainel.innerText = `Atualizando ${chave}...`;
            statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-yellow-500 font-mono";

            try {
                const camposOriginais = mapaLayout.fields || mapaLayout;
                const largura = camposOriginais[chave]?.w || 90;
                const altura = camposOriginais[chave]?.h || 14;
                const desc = camposOriginais[chave]?.description || '';

                const urlDestino = tipoDocumento === 'rg' ? '/api/save-coords-rg' : `/api/save-coords?tipo=${tipoDocumento}`;

                const response = await fetch(urlDestino, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        [chave]: { x: x, y: y, w: largura, h: altura, description: desc }
                    })
                });

                if (response.ok) {
                    statusPainel.innerText = "Modificações guardadas.";
                    statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-green-400 font-mono";
                    
                    // Sincroniza o estado em memória local
                    if (mapaLayout.fields) {
                        mapaLayout.fields[chave] = { x: x, y: y, w: largura, h: altura, description: desc };
                    } else {
                        mapaLayout[chave] = { x: x, y: y, w: largura, h: altura, description: desc };
                    }
                }
            } catch (err) {
                statusPainel.innerText = "Erro ao sincronizar dados.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-red-400 font-mono";
            }
        }

        window.onload = buscarConfiguracao;
    </script>
</body>
</html>
