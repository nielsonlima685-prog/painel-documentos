<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibrador Técnico - RG Lado a Lado</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Container do Canvas com dimensões estritas para o RG */
        #canvas-wrapper {
            position: relative;
            width: 740px;  
            height: 260px; 
            border: 2px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
            background-color: #1f242c;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        /* O canvas onde o PDF será desenhado como imagem de fundo */
        #pdf-render-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Camada interativa dos blocos por cima do PDF */
        #camada-blocos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
        }
        /* Caixas de calibração compactas para não esticar */
        .caixa-arrastavel {
            position: absolute;
            background-color: rgba(56, 139, 253, 0.35) !important;
            border: 1px solid #58a6ff !important;
            color: #ffffff !important;
            font-family: monospace;
            font-size: 9px !important;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            user-select: none;
            touch-action: none;
            border-radius: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        .caixa-arrastavel.selecionada {
            background-color: rgba(46, 160, 67, 0.45) !important;
            border: 1px solid #3fb950 !important;
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
            z-index: 100;
        }
        .texto-etiqueta {
            padding: 0 2px;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
            <div>
                <h1 class="text-xl font-bold text-white">Calibrador Avançado de Modelos</h1>
                <p class="text-xs text-gray-400">Arraste as tags ou clique em uma e use as setas do teclado (↑ ↓ ← →) para precisão pixel por pixel.</p>
            </div>
            <div id="status-painel" class="text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-blue-400 font-mono">
                Carregando sistemas...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-gray-900 p-4 rounded-lg border border-gray-800 flex flex-col h-[520px]">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Mapeamento de Chaves</h2>
                <div id="lista-campos" class="space-y-2 overflow-y-auto flex-1 pr-1">
                    </div>
            </div>

            <div class="lg:col-span-3 flex flex-col justify-center items-center bg-black p-4 rounded-lg border border-gray-800 min-h-[520px]">
                <div id="canvas-wrapper">
                    <canvas id="pdf-render-canvas"></canvas>
                    
                    <div id="camada-blocos"></div>
                </div>
                
                <div class="mt-4 flex gap-6 text-xs text-gray-500 font-mono">
                    <span>🔵 Arraste com o mouse</span>
                    <span>🟢 Borda Verde = Ajuste Fino por Setas Ativo</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configura o worker do PDF.js de forma estável via CDN
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const tipoDocumento = urlParams.get('tipo') || 'rg';

        const camadaBlocos = document.getElementById('camada-blocos');
        const listaCampos = document.getElementById('lista-campos');
        const statusPainel = document.getElementById('status-painel');
        
        let mapaLayout = {};
        let blocoSelecionado = null;

        // 1. Inicialização: Carrega o arquivo JSON e manda renderizar o PDF de fundo
        async function inicializarCalibrador() {
            try {
                // Rota inteligente que você estruturou no server.js
                const response = await fetch(`/api/coords?tipo=${tipoDocumento}`);
                mapaLayout = await response.json();
                
                statusPainel.innerText = "Renderizando plano de fundo do PDF...";
                
                // Dispara a renderização visual do PDF
                await renderizarFundoPDF();
                
                statusPainel.innerText = "Template e coordenadas sincronizados.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-green-400 font-mono";
                
                renderizarAbasCampos();
            } catch (err) {
                console.error(err);
                statusPainel.innerText = "Erro ao iniciar mapeamento gráfico.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-red-400 font-mono";
            }
        }

        // 2. Mecanismo de Renderização do PDF para Imagem de fundo usando Canvas
        async function renderizarFundoPDF() {
            const pdfUrl = `/api/model-pdf?tipo=${tipoDocumento}`;
            const htmlCanvas = document.getElementById('pdf-render-canvas');
            const ctx = htmlCanvas.getContext('2d');

            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1); // Pega a folha 1 do documento

            // Captura as dimensões exatas do wrapper para forçar o PDF a se esticar nela
            const wrapper = document.getElementById('canvas-wrapper');
            const viewport = page.getViewport({ scale: 1 });

            // Força a resolução interna do canvas a bater com os 740x260 pixels reais
            htmlCanvas.width = wrapper.clientWidth;
            htmlCanvas.height = wrapper.clientHeight;

            const renderContext = {
                canvasContext: ctx,
                viewport: page.getViewport({ 
                    scale: wrapper.clientWidth / viewport.width 
                })
            };

            await page.render(renderContext).promise;
        }

        // 3. Desenhar os blocos e a listagem lateral baseado na estrutura .fields
        function renderizarAbasCampos() {
            camadaBlocos.innerHTML = '';
            listaCampos.innerHTML = '';

            const campos = mapaLayout.fields || mapaLayout;

            Object.keys(campos).forEach(chave => {
                const config = campos[chave];
                if (config.x === undefined || config.y === undefined) return;

                // Reduz rótulo longo para não esticar a caixinha na tela
                const tagCurta = chave.replace('frente_', 'F_').replace('verso_', 'V_').toUpperCase();

                // Cria o marcador físico sobre o documento
                const bloco = document.createElement('div');
                bloco.className = 'caixa-arrastavel';
                bloco.id = `bloco-${chave}`;
                bloco.setAttribute('data-key', chave);
                bloco.innerHTML = `<span class="texto-etiqueta">${tagCurta}</span>`;
                
                // Aplica tamanhos fixos estruturados
                bloco.style.width = `${config.w || 95}px`;
                bloco.style.height = `${config.h || 14}px`;
                bloco.style.left = `${config.x}px`;
                bloco.style.top = `${config.y}px`;

                camadaBlocos.appendChild(bloco);

                // Injeta linha correspondente na esquerda
                const item = document.createElement('div');
                item.className = 'bg-gray-950 p-2 rounded border border-gray-800 text-xs flex flex-col gap-0.5 hover:border-gray-700 cursor-pointer';
                item.onclick = () => focarElemento(bloco);
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-300 font-mono truncate max-w-[120px]">${chave}</span>
                        <span id="coord-txt-${chave}" class="text-blue-400 font-mono font-bold">X:${config.x} Y:${config.y}</span>
                    </div>
                    <span class="text-[10px] text-gray-500 truncate">${config.description || ''}</span>
                `;
                listaCampos.appendChild(item);
            });

            ativarArrastoFisico();
        }

        // 4. Ativar movimentação livre com Interact.js
        function activarArrastoFisico() {
            interact('.caixa-arrastavel').draggable({
                inertia: false,
                modifiers: [
                    interact.modifiers.restrictRect({
                        restriction: 'parent',
                        endOnly: false
                    })
                ],
                autoScroll: false,
                listeners: {
                    start(event) {
                        focarElemento(event.target);
                    },
                    move(event) {
                        const target = event.target;
                        const chave = target.getAttribute('data-key');

                        let x = parseFloat(target.style.left) || 0;
                        let y = parseFloat(target.style.top) || 0;

                        x += event.dx;
                        y += event.dy;

                        target.style.left = `${x}px`;
                        target.style.top = `${y}px`;

                        const txt = document.getElementById(`coord-txt-${chave}`);
                        if (txt) txt.innerText = `X:${Math.round(x)} Y:${Math.round(y)}`;
                    },
                    end(event) {
                        const target = event.target;
                        const chave = target.getAttribute('data-key');
                        const xFinal = Math.round(parseFloat(target.style.left));
                        const yFinal = Math.round(parseFloat(target.style.top));

                        salvarNoServidor(chave, xFinal, yFinal);
                    }
                }
            });
        }

        function focarElemento(el) {
            if (blocoSelecionado) blocoSelecionado.classList.remove('selecionada');
            blocoSelecionado = el;
            blocoSelecionado.classList.add('selecionada');
        }

        // 5. Ajuste fino milimétrico com as setas do teclado
        document.addEventListener('keydown', (e) => {
            if (!blocoSelecionado) return;

            const setas = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (!setas.includes(e.key)) return;

            e.preventDefault();

            let x = Math.round(parseFloat(blocoSelecionado.style.left)) || 0;
            let y = Math.round(parseFloat(blocoSelecionado.style.top)) || 0;
            const chave = blocoSelecionado.getAttribute('data-key');

            if (e.key === 'ArrowUp') y -= 1;
            if (e.key === 'ArrowDown') y += 1;
            if (e.key === 'ArrowLeft') x -= 1;
            if (e.key === 'ArrowRight') x += 1;

            blocoSelecionado.style.left = `${x}px`;
            blocoSelecionado.style.top = `${y}px`;

            const txt = document.getElementById(`coord-txt-${chave}`);
            if (txt) txt.innerText = `X:${x} Y:${y}`;

            salvarNoServidor(chave, x, y);
        });

        // 6. Enviar alterações em tempo real para a rota inteligente do server.js
        async function salvarNoServidor(chave, x, y) {
            statusPainel.innerText = `Sincronizando ${chave}...`;
            statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-yellow-500 font-mono";

            try {
                const camposOriginais = mapaLayout.fields || mapaLayout;
                const w = camposOriginais[chave]?.w || 95;
                const h = camposOriginais[chave]?.h || 14;
                const desc = camposOriginais[chave]?.description || '';

                // Envia direto para a sua rota unificada respeitando o tipo pela query string
                const response = await fetch(`/api/save-coords?tipo=${tipoDocumento}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        [chave]: { x: x, y: y, w: w, h: h, description: desc }
                    })
                });

                if (response.ok) {
                    statusPainel.innerText = "Alteração salva.";
                    statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-green-400 font-mono";
                    
                    if (mapaLayout.fields) {
                        mapaLayout.fields[chave] = { x: x, y: y, w: w, h: h, description: desc };
                    } else {
                        mapaLayout[chave] = { x: x, y: y, w: w, h: h, description: desc };
                    }
                }
            } catch (err) {
                statusPainel.innerText = "Erro ao conectar com a API.";
                statusPainel.className = "text-xs px-3 py-1.5 rounded bg-gray-900 border border-gray-800 text-red-400 font-mono";
            }
        }

        window.onload = inicializarCalibrador;
    </script>
</body>
</html>
