<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibrador Isolado de RG | CH Contas</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        #viewport { width: 100%; height: 100%; overflow: auto; display: flex; justify-content: center; padding: 40px; background: #020617; }
        #pdf-container { position: relative; width: 842px; height: 595px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        #pdf-canvas { position: absolute; inset: 0; z-index: 10; width: 100%; height: 100%; }
        #drag-layer { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
        .draggable-field { 
            position: absolute; background: rgba(16, 185, 129, 0.8); border: 2px solid #10b981; 
            color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; cursor: move; 
            border-radius: 4px; white-space: nowrap; pointer-events: auto; user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .draggable-field.is-dragging { background: rgba(59, 130, 246, 0.95); border-color: #3b82f6; z-index: 100; }
    </style>
</head>
<body class="text-slate-200">
    <div class="flex flex-col h-screen">
        <header class="bg-slate-800 border-b border-slate-700 p-3 flex justify-between items-center shadow-lg">
            <h1 class="text-sm font-bold tracking-wider">CH CONTAS <span class="text-emerald-400">| CALIBRADOR RG</span></h1>
            <div id="save-status" class="text-[10px] font-mono bg-slate-900 px-4 py-1.5 rounded-full border border-slate-700 text-emerald-400">Pronto</div>
            <a href="/home" class="bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded text-xs font-bold transition-all">Voltar ao Painel</a>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-72 bg-slate-800 border-r border-slate-700 flex flex-col p-4 space-y-2 overflow-y-auto" id="fields-list">
                <div class="text-xs text-slate-400 mb-3">Movimente os marcadores verdes para calibrar as posições exatas dos textos no documento.</div>
            </aside>

            <main id="viewport">
                <div id="pdf-container">
                    <canvas id="pdf-canvas"></canvas>
                    <div id="drag-layer"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const containerHeight = 595; 
        const dragLayer = document.getElementById('drag-layer');
        const fieldsList = document.getElementById('fields-list');
        const saveStatus = document.getElementById('save-status');

        const defaultKeys = [
            "frente_estado", "frente_secretaria", "frente_nome", "frente_filiacao_pai", 
            "frente_filiacao_mae", "frente_data_nascimento", "frente_naturalidade", "frente_orgao_expedidor",
            "verso_rg_numero", "verso_cpf", "verso_data_expedicao", "verso_doc_origem", "verso_pis_pasep"
        ];

        async function init() {
            pdfjsLib.getDocument('/assets/template_rg.pdf').promise.then(pdf => pdf.getPage(1)).then(page => {
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 842 / page.getViewport({scale:1}).width });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                page.render({ canvasContext: context, viewport: viewport });
            }).catch(() => console.error("Erro: Salve o template_rg.pdf dentro da pasta assets."));

            let coords = {};
            try {
                const response = await fetch('/api/coords-rg');
                if (response.ok) coords = await response.json();
            } catch (e) { saveStatus.innerText = "Erro ao ler posições."; }

            renderFields(coords);
        }

        function renderFields(coords) {
            dragLayer.innerHTML = '';
            fieldsList.innerHTML = '<div class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-3">LISTAGEM DE MAPEAMENTO</div>';

            defaultKeys.forEach((key, idx) => {
                const pos = coords[key] || { x: 50 + (idx * 10), y: 400 - (idx * 15) };
                
                const div = document.createElement('div');
                div.className = 'draggable-field';
                div.id = `drag-${key}`;
                div.innerText = key.replace('frente_','F: ').replace('verso_','V: ').toUpperCase();
                div.style.left = `${pos.x}px`;
                div.style.top = `${containerHeight - pos.y - 14}px`;
                div.setAttribute('data-key', key);
                dragLayer.appendChild(div);

                const item = document.createElement('div');
                item.className = 'p-2 bg-slate-900/80 rounded border border-slate-700 flex justify-between items-center text-[10px]';
                item.innerHTML = `
                    <span class="font-bold text-slate-300 truncate w-32">${key.toUpperCase()}</span>
                    <span class="font-mono text-emerald-400" id="label-${key}">${Math.round(pos.x)}, ${Math.round(pos.y)}</span>
                `;
                fieldsList.appendChild(item);
            });

            setupInteract();
        }

        function setupInteract() {
            interact('.draggable-field').draggable({
                listeners: {
                    start(event) { event.target.classList.add('is-dragging'); },
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.style.left) || 0) + event.dx;
                        const y = (parseFloat(target.style.top) || 0) + event.dy;
                        target.style.left = `${x}px`;
                        target.style.top = `${y}px`;
                    },
                    end(event) {
                        const target = event.target;
                        target.classList.remove('is-dragging');
                        const key = target.getAttribute('data-key');
                        
                        const pdfX = Math.round(parseFloat(target.style.left));
                        const pdfY = Math.round(containerHeight - parseFloat(target.style.top) - 14);

                        document.getElementById(`label-${key}`).innerText = `${pdfX}, ${pdfY}`;
                        
                        saveStatus.innerText = "Sincronizando...";
                        fetch('/api/save-coords-rg', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ [key]: { x: pdfX, y: pdfY, w: 120 } })
                        }).then(res => {
                            if(res.ok) saveStatus.innerText = "Sincronizado";
                        });
                    }
                }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
