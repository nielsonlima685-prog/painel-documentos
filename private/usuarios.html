<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Gestão de Usuários | MIND PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #09090b; color: #fafafa; }
        .glass-card { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); border-radius: 20px; }
        
        /* Menu responsivo */
        .menu-toggle { display: none; background: rgba(24, 24, 27, 0.9); border: 1px solid #3f3f46; border-radius: 12px; padding: 10px 14px; cursor: pointer; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #09090b; border-right: 1px solid #27272a; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; overflow-y: auto; }
        .sidebar.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            main { margin-left: 0 !important; width: 100%; }
            .grid-cols-1\\.md\\:grid-cols-3 { grid-template-columns: 1fr !important; gap: 1rem !important; }
            .overflow-x-auto { overflow-x: auto; }
            table { min-width: 500px; }
            .px-6 { padding-left: 1rem; padding-right: 1rem; }
            .py-4 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        }
        
        input, select { background: #18181b !important; border: 1px solid #3f3f46 !important; color: white !important; border-radius: 12px !important; padding: 12px !important; }
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 1100; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>
    
    <aside id="sidebar" class="sidebar">
        <div class="p-5">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><i class="fas fa-brain text-white text-sm"></i></div>
                    <span class="text-xl font-bold">MIND<span class="text-blue-500">PRO</span></span>
                </div>
                <button onclick="closeMenu()" class="text-zinc-500 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="space-y-2">
                <a href="/home" class="flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 transition-all text-sm"><i class="fas fa-home w-5"></i> Dashboard</a>
                <a href="/emissao" class="flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 transition-all text-sm"><i class="fas fa-file-invoice w-5"></i> Emissão CRLV</a>
                <a href="/calibrar" class="flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 transition-all text-sm"><i class="fas fa-crosshairs w-5"></i> Calibrador</a>
                <div class="pt-6"><p class="px-4 text-[10px] font-bold text-red-500/80 uppercase">Administração</p></div>
                <a href="/usuarios" class="active-link flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-600/10 text-blue-500 text-sm"><i class="fas fa-users-cog w-5"></i> Gerir Usuários</a>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-zinc-800">
                <button onclick="window.location.href='/logout'" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-400 hover:bg-red-400/10 transition-all text-sm"><i class="fas fa-sign-out-alt w-5"></i> Sair</button>
            </div>
        </div>
    </aside>

    <main>
        <header class="h-16 border-b border-zinc-800 flex items-center justify-between px-4 bg-[#09090b]/50 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars text-white text-xl"></i></button>
                <h2 class="text-base font-semibold">Controle de Acesso</h2>
                <span id="user-count" class="px-2 py-0.5 rounded text-[10px] bg-zinc-800 text-zinc-400">0 Usuários</span>
            </div>
            <button onclick="openAddModal()" class="bg-blue-600 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1"><i class="fas fa-plus"></i> Novo</button>
        </header>

        <div class="p-4">
            <div class="max-w-5xl mx-auto">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                    <div class="glass-card p-4 rounded-2xl"><p class="text-zinc-500 text-[10px] font-bold uppercase">Total</p><h4 id="total-users" class="text-2xl font-bold">0</h4></div>
                    <div class="glass-card p-4 rounded-2xl"><p class="text-zinc-500 text-[10px] font-bold uppercase">Administradores</p><h4 id="admin-count" class="text-2xl font-bold">0</h4></div>
                    <div class="glass-card p-4 rounded-2xl"><p class="text-zinc-500 text-[10px] font-bold uppercase">Operadores</p><h4 id="user-count-total" class="text-2xl font-bold">0</h4></div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="border-b border-zinc-800 bg-zinc-900/50"><th class="px-4 py-3 text-[10px] font-bold uppercase">Usuário</th><th class="px-4 py-3 text-[10px] font-bold uppercase">Nível</th><th class="px-4 py-3 text-[10px] font-bold uppercase">Criado</th><th class="px-4 py-3 text-right text-[10px] font-bold uppercase">Ações</th></tr></thead>
                        <tbody id="user-list"><tr><td colspan="4" class="px-4 py-8 text-center text-zinc-500"><i class="fas fa-spinner fa-spin mr-2"></i> Carregando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-usuario" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="glass-card w-full max-w-md p-6 rounded-3xl space-y-5">
            <div class="flex justify-between"><h3 id="modal-title" class="text-xl font-bold">Novo Usuário</h3><button onclick="closeModal()" class="text-zinc-500 hover:text-white"><i class="fas fa-times"></i></button></div>
            <form id="user-form" class="space-y-4">
                <input type="hidden" id="user-id">
                <div><label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Usuário *</label><input type="text" id="username" class="w-full rounded-xl outline-none" placeholder="usuario" required></div>
                <div><label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Nome</label><input type="text" id="nome" class="w-full rounded-xl outline-none" placeholder="Nome"></div>
                <div><label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Senha *</label><input type="password" id="password" class="w-full rounded-xl outline-none" placeholder="••••••" required></div>
                <div><label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Nível</label><select id="role" class="w-full rounded-xl"><option value="user">Operador</option><option value="admin">Administrador</option></select></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold"><i class="fas fa-save mr-2"></i> Salvar</button>
            </form>
        </div>
    </div>
    <div id="toast" class="toast hidden glass-card px-4 py-2 rounded-xl"></div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
        function openAddModal() { document.getElementById('modal-title').innerText = 'Novo Usuário'; document.getElementById('user-id').value = ''; document.getElementById('username').value = ''; document.getElementById('nome').value = ''; document.getElementById('password').value = ''; document.getElementById('password').required = true; document.getElementById('role').value = 'user'; document.getElementById('modal-usuario').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-usuario').classList.add('hidden'); }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/usuarios');
                if (!response.ok) throw new Error();
                const users = await response.json();
                document.getElementById('total-users').innerText = users.length;
                document.getElementById('admin-count').innerText = users.filter(u => u.role === 'admin').length;
                document.getElementById('user-count-total').innerText = users.filter(u => u.role === 'user').length;
                document.getElementById('user-count').innerText = `${users.length} Usuários`;
                document.getElementById('user-list').innerHTML = users.map(user => `<tr class="border-b border-zinc-800"><td class="px-4 py-3"><div><p class="font-bold text-sm">${user.user}</p><p class="text-[10px] text-zinc-500">${user.nome || user.user}</p></div></td><td class="px-4 py-3"><span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${user.role === 'admin' ? 'bg-blue-500/10 text-blue-400' : 'bg-purple-500/10 text-purple-400'}">${user.role === 'admin' ? 'Master' : 'Operador'}</span></td><td class="px-4 py-3 text-xs text-zinc-500">${new Date(user.createdAt).toLocaleDateString('pt-BR')}</td><td class="px-4 py-3 text-right"><button onclick='editUser(${user.id}, "${user.user}", "${user.nome || ''}", "${user.role}")' class="p-2 hover:text-white"><i class="fas fa-edit"></i></button><button onclick='deleteUser(${user.id}, "${user.user}")' class="p-2 hover:text-red-500"><i class="fas fa-trash"></i></button></td></tr>`).join('');
            } catch (error) { showToast('Erro ao carregar', 'error'); }
        }
        
        function editUser(id, username, nome, role) { document.getElementById('modal-title').innerText = 'Editar'; document.getElementById('user-id').value = id; document.getElementById('username').value = username; document.getElementById('nome').value = nome; document.getElementById('password').value = ''; document.getElementById('password').required = false; document.getElementById('role').value = role; openAddModal(); }
        
        async function deleteUser(id, username) { if(confirm(`Excluir "${username}"?`)) { try { const res = await fetch(`/api/usuarios/${id}`, { method: 'DELETE' }); const result = await res.json(); if(result.success) { showToast('Usuário excluído!', 'success'); loadUsers(); } else showToast(result.error, 'error'); } catch(e) { showToast('Erro', 'error'); } } }
        
        document.getElementById('user-form').addEventListener('submit', async (e) => { e.preventDefault(); const id = document.getElementById('user-id').value; const user = document.getElementById('username').value; const nome = document.getElementById('nome').value; const pass = document.getElementById('password').value; const role = document.getElementById('role').value; if(!user) return showToast('Usuário obrigatório', 'error'); if(!id && !pass) return showToast('Senha obrigatória', 'error'); const url = id ? `/api/usuarios/${id}` : '/api/usuarios'; const method = id ? 'PUT' : 'POST'; const body = { user, nome, role }; if(pass) body.pass = pass; try { const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); const result = await res.json(); if(result.success) { showToast(id ? 'Atualizado!' : 'Criado!', 'success'); closeModal(); loadUsers(); } else showToast(result.error, 'error'); } catch(e) { showToast('Erro', 'error'); } });
        
        function showToast(msg, type) { const toast = document.getElementById('toast'); toast.className = `toast glass-card px-4 py-2 rounded-xl ${type === 'error' ? 'text-red-400' : 'text-green-400'}`; toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${msg}`; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }
        
        window.onclick = function(e) { if(e.target == document.getElementById('modal-usuario')) closeModal(); }
        
        fetch('/api/session').then(res => res.json()).then(data => { if(data.role !== 'admin') { alert('Acesso negado'); window.location.href = '/home'; } loadUsers(); }).catch(() => window.location.href = '/login.html');
    </script>
</body>
</html>
