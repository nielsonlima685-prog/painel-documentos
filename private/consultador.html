<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Consultador de Antecedentes | CH Vendas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .result-card {
            transition: all 0.3s ease;
        }
        .result-card.aprovado { background: linear-gradient(135deg, #10b981, #059669); }
        .result-card.reprovado { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .result-card.erro { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                <i class="fas fa-shield-alt text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Consultador de Antecedentes</h1>
            <p class="text-gray-300 text-sm">Consulta oficial ao CNJ</p>
        </div>

        <!-- Card de Consulta -->
        <div class="glass-card rounded-2xl shadow-xl p-6 mb-6">
            <form id="consultaForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">CPF *</label>
                    <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg"
                           oninput="formatarCPF(this)" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nome Completo</label>
                    <input type="text" id="nome" placeholder="NOME COMPLETO" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                </div>
                <button type="submit" id="btnConsultar" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-xl transition-all hover:scale-105">
                    <i class="fas fa-search mr-2"></i> Consultar
                </button>
            </form>
        </div>

        <!-- Resultado -->
        <div id="resultado" class="hidden"></div>

        <!-- Botão Voltar -->
        <div class="text-center mt-6">
            <a href="/home" class="text-gray-300 text-sm hover:text-white transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Voltar ao Painel
            </a>
        </div>
    </div>

    <script>
        function formatarCPF(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor.length > 3) valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            if (valor.length > 6) valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            if (valor.length > 9) valor = valor.replace(/(\d{3})(\d)/, '$1-$2');
            input.value = valor;
        }

        document.getElementById('consultaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const nome = document.getElementById('nome').value;
            
            if (!cpf) {
                alert('Digite o CPF');
                return;
            }
            
            const resultadoDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnConsultar');
            
            resultadoDiv.innerHTML = `
                <div class="glass-card rounded-2xl shadow-xl p-8 text-center">
                    <div class="loading mx-auto mb-4"></div>
                    <p class="text-gray-600">Consultando base do CNJ...</p>
                    <p class="text-xs text-gray-400 mt-2">Aguarde, isso pode levar alguns segundos</p>
                </div>
            `;
            resultadoDiv.classList.remove('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Consultando...';
            
            try {
                const response = await fetch('/api/consultar-antecedentes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf, nome })
                });
                
                const data = await response.json();
                console.log('Resposta do servidor:', data);
                
                let statusText = '', icon = '', bgClass = '';
                
                if (data.status === 'aprovado') {
                    statusText = 'APROVADO';
                    icon = 'fa-check-circle';
                    bgClass = 'aprovado';
                } else if (data.status === 'reprovado') {
                    statusText = 'REPROVADO';
                    icon = 'fa-times-circle';
                    bgClass = 'reprovado';
                } else {
                    statusText = 'ERRO';
                    icon = 'fa-exclamation-triangle';
                    bgClass = 'erro';
                }
                
                const mensagem = data.mensagem || 'Consulta realizada';
                const cpfConsultado = data.cpf_consultado || cpf;
                
                resultadoDiv.innerHTML = `
                    <div class="result-card ${bgClass} rounded-2xl shadow-xl p-6 text-white text-center">
                        <i class="fas ${icon} text-5xl mb-3"></i>
                        <h2 class="text-2xl font-bold mb-2">${statusText}</h2>
                        <p class="text-sm opacity-90">${mensagem}</p>
                        <div class="mt-4 text-xs opacity-75">CPF consultado: ${cpfConsultado}</div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Erro:', error);
                resultadoDiv.innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 rounded-2xl p-6 text-center">
                        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                        <p class="font-bold">Erro na consulta</p>
                        <p class="text-sm">${error.message}</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search mr-2"></i> Consultar';
            }
        });
    </script>
</body>
</html>
