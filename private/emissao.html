<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Emissor Pro - Seleção de Veículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding: 16px; }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .form-card { padding: 1rem !important; }
            .grid-cols-1\\.md\\:grid-cols-3 { grid-template-columns: 1fr !important; gap: 1rem !important; }
            .input-group input, .input-group select { font-size: 14px; padding: 8px 12px; }
            .input-group label { font-size: 10px; }
            h1.text-2xl { font-size: 1.25rem; }
            header { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
        .form-card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; color: #4b5563; margin-bottom: 4px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; text-transform: uppercase; }
        .input-group input:focus { outline: none; border-color: #2563eb; ring: 2px solid #bfdbfe; }
        .template-select { border: 2px solid #2563eb !important; background-color: #eff6ff !important; }
        button { width: 100%; }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto">
        <header class="mb-6 flex justify-between items-center flex-wrap gap-2">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800">Emissão de CRLV-e</h1>
                <p class="text-xs text-gray-500">Selecione o PDF base e preencha os dados</p>
            </div>
            <div class="flex gap-2">
                <span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-[10px] font-bold">Automático</span>
                <span class="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-bold">PDF Base</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5">
            <div id="btnCarro" onclick="setTemplate('carro')" class="form-card p-3 flex items-center gap-3 cursor-pointer border-2 border-transparent">
                <div class="bg-blue-100 p-2 rounded-full text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg></div>
                <div><p class="font-bold text-gray-800 text-sm">Template Carro</p><p class="text-[10px] text-gray-500">Usa o PDF original de veículo</p></div>
            </div>
            <div id="btnMoto" onclick="setTemplate('moto')" class="form-card p-3 flex items-center gap-3 cursor-pointer border-2 border-transparent">
                <div class="bg-indigo-100 p-2 rounded-full text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg></div>
                <div><p class="font-bold text-gray-800 text-sm">Template Moto</p><p class="text-[10px] text-gray-500">Usa o PDF original de motocicleta</p></div>
            </div>
        </div>

        <div class="form-card p-4 mb-5">
            <div class="flex items-center gap-2 mb-3 text-blue-700"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg><h2 class="font-bold text-sm">Colar Dados (OCR)</h2></div>
            <textarea id="importArea" class="w-full h-16 p-2 border rounded-lg bg-gray-50 text-sm" placeholder="Cole o texto aqui para preencher automaticamente..." oninput="processarTexto(this.value)"></textarea>
        </div>

        <form action="/api/gerar-final" method="POST" id="formCrlv">
            <input type="hidden" name="tipo_template" id="tipo_template" value="carro">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="form-card p-4 space-y-3">
                    <h3 class="font-bold text-gray-700 border-b pb-2 text-sm">Identificação</h3>
                    <div class="input-group"><label>Placa</label><input type="text" name="placa" id="placa" maxlength="7" placeholder="ABC1D23" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>RENAVAM</label><input type="text" name="renavam" id="renavam" maxlength="11" placeholder="00000000000" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>Chassi</label><input type="text" name="chassi" id="chassi" placeholder="Digite o chassi" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>Motor</label><input type="text" name="motor" id="motor" placeholder="Número do Motor" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>Nº CRV</label><input type="text" name="numero_crv" id="numero_crv" placeholder="Número do CRV" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="input-group"><label>Exercício</label><input type="text" name="exercicio" id="exercicio" value="2025" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="input-group"><label>Combustível</label><input type="text" name="combustivel" id="combustivel" placeholder="ALCOOL/GASOL" oninput="this.value = this.value.toUpperCase()"></div>
                    </div>
                </div>
                <div class="form-card p-4 space-y-3">
                    <h3 class="font-bold text-gray-700 border-b pb-2 text-sm">Características</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="input-group"><label>Ano Fab.</label><input type="text" name="ano_fabricacao" id="ano_fabricacao" placeholder="2024" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="input-group"><label>Ano Mod.</label><input type="text" name="ano_modelo" id="ano_modelo" placeholder="2025" oninput="this.value = this.value.toUpperCase()"></div>
                    </div>
                    <div class="input-group"><label>Marca/Modelo</label><input type="text" name="marca_modelo" id="marca_modelo" placeholder="RENAULT/KWID" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>Cor</label><input type="text" name="cor" id="cor" placeholder="BRANCA" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>Categoria</label><input type="text" name="categoria" id="categoria" value="PARTICULAR" oninput="this.value = this.value.toUpperCase()"></div>
                </div>
                <div class="form-card p-4 space-y-3">
                    <h3 class="font-bold text-gray-700 border-b pb-2 text-sm">Proprietário</h3>
                    <div class="input-group"><label>Nome</label><input type="text" name="nome" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="input-group"><label>CPF/CNPJ</label><input type="text" name="cpf_cnpj" id="cpf_cnpj" placeholder="000.000.000-00" oninput="formatarCpfCnpj(this)"></div>
                    <div class="input-group"><label>Código CLA</label><input type="text" name="cod_seguranca" id="cod_seguranca" placeholder="11 dígitos" oninput="this.value = this.value.toUpperCase()"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="input-group"><label>Local</label><input type="text" name="local" id="local" value="BRASILIA - DF" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="input-group"><label>Data</label><input type="text" name="data" id="data" placeholder="DD/MM/AAAA" maxlength="10" oninput="formatarData(this)"></div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition-all text-sm">GERAR DOCUMENTO</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Função para formatar CPF/CNPJ automaticamente
        function formatarCpfCnpj(input) {
            let valor = input.value.replace(/\D/g, '');
            
            if (valor.length <= 11) {
                // CPF: 000.000.000-00
                if (valor.length > 3) valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                if (valor.length > 6) valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                if (valor.length > 9) valor = valor.replace(/(\d{3})(\d)/, '$1-$2');
            } else {
                // CNPJ: 00.000.000/0000-00
                if (valor.length > 2) valor = valor.replace(/(\d{2})(\d)/, '$1.$2');
                if (valor.length > 5) valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                if (valor.length > 8) valor = valor.replace(/(\d{3})(\d)/, '$1/$2');
                if (valor.length > 12) valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
            }
            
            input.value = valor;
        }
        
        // Função para formatar DATA automaticamente: 10081999 -> 10/08/1999
        function formatarData(input) {
            let valor = input.value.replace(/\D/g, '');
            
            if (valor.length > 2) {
                valor = valor.replace(/(\d{2})(\d)/, '$1/$2');
            }
            if (valor.length > 5) {
                valor = valor.replace(/(\d{2})(\d{4})$/, '$1/$2');
            }
            
            input.value = valor;
        }
        
        // Função para formatar DATA no OCR também
        function formatarDataString(data) {
            let limpo = data.replace(/\D/g, '');
            if (limpo.length === 8) {
                return limpo.replace(/(\d{2})(\d{2})(\d{4})/, '$1/$2/$3');
            }
            return data;
        }
        
        function setTemplate(tipo) {
            document.getElementById('tipo_template').value = tipo;
            document.getElementById('btnCarro').classList.toggle('template-select', tipo === 'carro');
            document.getElementById('btnMoto').classList.toggle('template-select', tipo === 'moto');
        }
        setTemplate('carro');
        
        function processarTexto(texto) {
            if (!texto) return;
            const txt = texto.toUpperCase();
            
            const renavamMatch = txt.match(/RENAVAM\s*(\d{11})/i) || txt.match(/\b(\d{11})\b/);
            if (renavamMatch) document.getElementById('renavam').value = renavamMatch[1];
            
            const placaMatch = txt.match(/\b([A-Z]{3}[0-9][A-Z0-9][0-9]{2})\b/);
            if (placaMatch) document.getElementById('placa').value = placaMatch[1];
            
            const chassiMatch = txt.match(/\b([A-Z0-9]{17})\b/);
            if (chassiMatch) document.getElementById('chassi').value = chassiMatch[1];
            
            const motorMatch = txt.match(/MOTOR\s*([A-Z0-9]+)/i);
            if (motorMatch) document.getElementById('motor').value = motorMatch[1];
            
            const crvMatch = txt.match(/CRV\s*(\d+)/i) || txt.match(/NÚMERO DO CRV\s*(\d+)/i);
            if (crvMatch) document.getElementById('numero_crv').value = crvMatch[1];
            
            // CPF/CNPJ com formatação
            const cpfMatch = txt.match(/\b(\d{11})\b/);
            if (cpfMatch) {
                let cpf = cpfMatch[1];
                cpf = cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
                document.getElementById('cpf_cnpj').value = cpf;
            }
            
            const cnpjMatch = txt.match(/\b(\d{14})\b/);
            if (cnpjMatch) {
                let cnpj = cnpjMatch[1];
                cnpj = cnpj.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
                document.getElementById('cpf_cnpj').value = cnpj;
            }
            
            const nomeMatch = txt.match(/NOME\s*([A-Z\s]{5,60})(?=CPF|CNPJ|LOCAL|$)/i);
            if (nomeMatch) document.getElementById('nome').value = nomeMatch[1].trim();
            
            // Data com formatação automática
            const dataMatch = txt.match(/\b(\d{2}\/\d{2}\/\d{4})\b/) || txt.match(/\b(\d{8})\b/);
            if (dataMatch) {
                let data = dataMatch[1];
                if (data.length === 8) {
                    data = formatarDataString(data);
                }
                document.getElementById('data').value = data;
            }
        }
    </script>
</body>
</html>
