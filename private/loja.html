<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CH Bicos - Comprar Contas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0f);
            color: var(--tg-theme-text-color, #fafafa);
            padding: 16px;
        }
        .step-card {
            background: var(--tg-theme-secondary-bg-color, rgba(24, 24, 27, 0.9));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .filter-btn {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid #3f3f46;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 4px;
        }
        .filter-btn.active {
            background: #0088cc;
            border-color: #0088cc;
        }
        .photo-preview {
            width: 100%;
            max-width: 200px;
            border-radius: 16px;
            margin: 10px auto;
            display: none;
        }
        .result-card {
            background: var(--tg-theme-secondary-bg-color, #1e1e2e);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-card:active { transform: scale(0.98); }
        .btn-comprar {
            background: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .saldo-display {
            background: #00ff8822;
            border: 1px solid #00ff88;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            margin-bottom: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .step-indicator {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #3f3f46;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .step.active { background: #0088cc; }
        .step.completed { background: #00ff88; color: #000; }
    </style>
</head>
<body>
    <div class="step-indicator">
        <div class="step active" id="step1">1</div>
        <div class="step" id="step2">2</div>
        <div class="step" id="step3">3</div>
        <div class="step" id="step4">4</div>
    </div>

    <!-- Step 1: Filtros -->
    <div id="step-filtros" class="step-card">
        <h2 class="text-xl font-bold mb-4">🔍 Buscar BICO</h2>
        <p class="text-zinc-400 text-sm mb-4">Selecione os filtros e envie uma foto sua</p>
        
        <div class="mb-4">
            <label class="block text-sm mb-2">👤 Gênero</label>
            <div>
                <button class="filter-btn" data-genero="homem">👨 Homem</button>
                <button class="filter-btn" data-genero="mulher">👩 Mulher</button>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm mb-2">🚗 CNH</label>
            <div>
                <button class="filter-btn" data-cnh="AB">🏍️ AB (Moto)</button>
                <button class="filter-btn" data-cnh="B">🚗 B (Carro)</button>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm mb-2">📱 Plataforma</label>
            <div>
                <button class="filter-btn" data-plataforma="UBER">Uber</button>
                <button class="filter-btn" data-plataforma="99">99</button>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm mb-2">📸 Envie sua foto</label>
            <input type="file" id="photoInput" accept="image/*" class="bg-zinc-800 rounded-lg p-2 w-full">
            <img id="preview" class="photo-preview">
        </div>
        
        <button id="btnBuscar" class="btn-comprar" style="background: #00ff88; color: #000;">🔍 Buscar BICOS</button>
    </div>

    <!-- Step 2: Resultados -->
    <div id="step-resultados" class="step-card" style="display: none;">
        <h2 class="text-xl font-bold mb-4">📋 Resultados</h2>
        <div id="resultados-list">
            <div class="loading">Carregando...</div>
        </div>
        <button id="btnVoltarFiltros" class="btn-comprar" style="background: #3f3f46;">← Voltar</button>
    </div>

    <!-- Step 3: Pagamento -->
    <div id="step-pagamento" class="step-card" style="display: none;">
        <h2 class="text-xl font-bold mb-4">💳 Pagamento</h2>
        <div id="pagamento-info"></div>
        <button id="btnCancelarPagamento" class="btn-comprar" style="background: #dc2626; margin-top: 10px;">❌ Cancelar</button>
    </div>

    <!-- Step 4: Dados do BICO -->
    <div id="step-dados" class="step-card" style="display: none;">
        <h2 class="text-xl font-bold mb-4">📄 Dados do BICO</h2>
        <div id="dados-bico"></div>
        <button id="btnFechar" class="btn-comprar" style="background: #00ff88; color: #000;">✅ Fechar</button>
    </div>

    <script>
        let tg = null;
        let fotoSelecionada = null;
        let filtros = { genero: 'homem', cnh: 'AB', plataforma: 'UBER' };
        let resultados = [];
        let bicoSelecionado = null;
        let userId = null;
        let saldoAtual = 0;
        
        // Inicializar Telegram WebApp
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                document.body.style.background = tg.themeParams.bg_color || '#0a0a0f';
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    userId = user.id;
                    console.log('Usuário Telegram:', userId);
                }
            } else {
                userId = 'web_' + Date.now();
            }
            carregarSaldo();
        }
        
        async function carregarSaldo() {
            try {
                const response = await fetch('/api/user/saldo');
                const data = await response.json();
                saldoAtual = data.saldo || 0;
            } catch (err) {
                console.error('Erro ao carregar saldo:', err);
            }
        }
        
        // Atualizar UI dos filtros
        document.querySelectorAll('[data-genero]').forEach(btn => {
            btn.addEventListener('click', () => {
                filtros.genero = btn.dataset.genero;
                document.querySelectorAll('[data-genero]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        document.querySelectorAll('[data-cnh]').forEach(btn => {
            btn.addEventListener('click', () => {
                filtros.cnh = btn.dataset.cnh;
                document.querySelectorAll('[data-cnh]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        document.querySelectorAll('[data-plataforma]').forEach(btn => {
            btn.addEventListener('click', () => {
                filtros.plataforma = btn.dataset.plataforma;
                document.querySelectorAll('[data-plataforma]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        // Preview da foto
        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    fotoSelecionada = event.target.result;
                    document.getElementById('preview').src = fotoSelecionada;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Buscar BICOS
        async function buscarBicos() {
            if (!fotoSelecionada) {
                alert('📸 Por favor, envie uma foto primeiro!');
                return;
            }
            
            document.getElementById('step-filtros').style.display = 'none';
            document.getElementById('step-resultados').style.display = 'block';
            document.getElementById('step2').classList.add('active');
            
            const resultadosDiv = document.getElementById('resultados-list');
            resultadosDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Comparando rostos...</div>';
            
            try {
                const categoria = `${filtros.genero}_${filtros.cnh}_${filtros.plataforma}`;
                
                const response = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        imagem: fotoSelecionada,
                        categoria: categoria
                    })
                });
                
                const data = await response.json();
                resultados = data.resultados || [];
                
                if (resultados.length === 0) {
                    resultadosDiv.innerHTML = '<div class="loading">😕 Nenhum BICO encontrado. Tente outra foto ou ajuste os filtros.</div>';
                } else {
                    renderizarResultados(resultados);
                }
            } catch (err) {
                console.error('Erro:', err);
                resultadosDiv.innerHTML = '<div class="loading">❌ Erro ao buscar BICOS. Tente novamente.</div>';
            }
        }
        
        function renderizarResultados(lista) {
            const container = document.getElementById('resultados-list');
            const valor = filtros.genero === 'mulher' ? 40 : 20;
            
            container.innerHTML = lista.map((bico, idx) => {
                const nomeArquivo = bico.caminho.split('/').pop().replace(/\.jpg$/, '').replace(/_/g, ' ');
                return `
                    <div class="result-card" onclick="selecionarBico(${idx})">
                        <div style="display: flex; gap: 12px;">
                            <div style="flex: 1;">
                                <div style="font-weight: bold;">${nomeArquivo}</div>
                                <div style="font-size: 12px; opacity: 0.7;">Similaridade: ${bico.similaridade}%</div>
                                <div style="font-size: 14px; font-weight: bold; color: #00ff88;">R$ ${valor},00</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function selecionarBico(index) {
            bicoSelecionado = resultados[index];
            document.getElementById('step-resultados').style.display = 'none';
            document.getElementById('step-pagamento').style.display = 'block';
            document.getElementById('step3').classList.add('active');
            
            const valor = filtros.genero === 'mulher' ? 40 : 20;
            const nomeArquivo = bicoSelecionado.caminho.split('/').pop().replace(/\.jpg$/, '').replace(/_/g, ' ');
            
            document.getElementById('pagamento-info').innerHTML = `
                <div style="text-align: center;">
                    <p><strong>${nomeArquivo}</strong></p>
                    <p>Similaridade: ${bicoSelecionado.similaridade}%</p>
                    <p style="font-size: 24px; font-weight: bold; color: #00ff88; margin: 16px 0;">R$ ${valor},00</p>
                    <div id="saldo-info" style="margin-bottom: 16px; padding: 10px; background: #1e1e2e; border-radius: 12px;">
                        💰 Seu saldo: R$ ${saldoAtual.toFixed(2)}
                    </div>
                    <button id="btnPagarComSaldo" class="btn-comprar" style="background: #00ff88; color: #000; margin-bottom: 10px;">💰 Pagar com Saldo</button>
                    <button id="btnGerarPix" class="btn-comprar">💳 Gerar PIX</button>
                </div>
            `;
            
            document.getElementById('btnPagarComSaldo')?.addEventListener('click', () => pagarComSaldo(valor, nomeArquivo));
            document.getElementById('btnGerarPix')?.addEventListener('click', () => gerarPix(valor, nomeArquivo));
        }
        
        async function pagarComSaldo(valor, nomeArquivo) {
            if (saldoAtual < valor) {
                alert(`❌ Saldo insuficiente! Seu saldo: R$ ${saldoAtual.toFixed(2)}`);
                return;
            }
            
            const response = await fetch('/api/comprar/saldo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    bicoId: bicoSelecionado.caminho,
                    valor: valor
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                saldoAtual = result.saldo;
                document.getElementById('step-pagamento').style.display = 'none';
                document.getElementById('step-dados').style.display = 'block';
                document.getElementById('step4').classList.add('active');
                document.getElementById('dados-bico').innerHTML = `
                    <div style="white-space: pre-wrap; background: #1e1e2e; padding: 16px; border-radius: 12px;">
                        ${result.dados}
                    </div>
                    <p style="margin-top: 16px; text-align: center;">✅ Compra realizada com sucesso!</p>
                `;
            } else {
                alert('❌ ' + (result.error || 'Erro ao processar compra'));
            }
        }
        
        async function gerarPix(valor, nomeArquivo) {
            const response = await fetch('/api/comprar/pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    valor: valor,
                    descricao: `BICO - ${nomeArquivo}`
                })
            });
            
            const result = await response.json();
            
            if (result.success && result.qrCode) {
                document.getElementById('pagamento-info').innerHTML = `
                    <div style="text-align: center;">
                        <p>📱 Escaneie o QR Code abaixo:</p>
                        <img src="data:image/png;base64,${result.qrCode}" style="width: 200px; margin: 16px auto;">
                        <p style="font-size: 12px;">Código PIX:</p>
                        <code style="background: #1e1e2e; padding: 8px; border-radius: 8px; display: block; word-break: break-all; font-size: 10px;">${result.pixCode}</code>
                        <button id="btnConfirmarPix" class="btn-comprar" style="margin-top: 16px;">✅ Já paguei</button>
                        <button id="btnCancelarPix" class="btn-comprar" style="background: #dc2626; margin-top: 10px;">❌ Cancelar</button>
                    </div>
                `;
                
                document.getElementById('btnConfirmarPix')?.addEventListener('click', () => confirmarPix(result.transactionId, nomeArquivo));
                document.getElementById('btnCancelarPix')?.addEventListener('click', () => {
                    document.getElementById('step-pagamento').style.display = 'none';
                    document.getElementById('step-resultados').style.display = 'block';
                });
            } else {
                alert('❌ Erro ao gerar PIX: ' + (result.error || ''));
            }
        }
        
        async function confirmarPix(transactionId, nomeArquivo) {
            const response = await fetch(`/api/comprar/confirmar-pix/${transactionId}`);
            const result = await response.json();
            
            if (result.status === 'approved') {
                document.getElementById('step-pagamento').style.display = 'none';
                document.getElementById('step-dados').style.display = 'block';
                document.getElementById('step4').classList.add('active');
                document.getElementById('dados-bico').innerHTML = `
                    <div style="white-space: pre-wrap; background: #1e1e2e; padding: 16px; border-radius: 12px;">
                        ✅ Pagamento confirmado!<br><br>
                        Os dados do BICO serão enviados para seu Telegram em instantes.
                    </div>
                    <p style="margin-top: 16px; text-align: center;">🎉 Obrigado pela compra!</p>
                `;
            } else {
                alert('⚠️ Pagamento ainda não confirmado. Aguarde alguns segundos e tente novamente.');
            }
        }
        
        document.getElementById('btnBuscar').addEventListener('click', buscarBicos);
        document.getElementById('btnVoltarFiltros').addEventListener('click', () => {
            document.getElementById('step-resultados').style.display = 'none';
            document.getElementById('step-filtros').style.display = 'block';
        });
        document.getElementById('btnFechar').addEventListener('click', () => {
            if (tg) tg.close();
            else window.close();
        });
        document.getElementById('btnCancelarPagamento').addEventListener('click', () => {
            document.getElementById('step-pagamento').style.display = 'none';
            document.getElementById('step-resultados').style.display = 'block';
        });
        
        // Ativar filtros padrão
        document.querySelector('[data-genero="homem"]').classList.add('active');
        document.querySelector('[data-cnh="AB"]').classList.add('active');
        document.querySelector('[data-plataforma="UBER"]').classList.add('active');
        
        initTelegram();
    </script>
</body>
</html>
