<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH Contas - Emissor CRLV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fas fa-file-invoice text-2xl"></i>
            <h1 class="text-xl font-bold tracking-tight">CH CONTAS <span class="font-light text-indigo-200">| Emissor</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="/calibrar" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm transition">
                <i class="fas fa-crosshairs mr-2"></i>Calibrar Posições
            </a>
            <a href="/logout" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded text-sm transition">Sair</a>
        </div>
    </nav>

    <main class="flex-1 container mx-auto p-6">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-slate-50 border-b p-6">
                <h2 class="text-lg font-semibold text-slate-800">Dados do Documento</h2>
                <p class="text-sm text-slate-500">Preencha os campos abaixo para gerar o PDF licenciado.</p>
            </div>

            <form action="/gerar-crlv" method="POST" target="_blank" class="p-6 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Tipo de Veículo</label>
                        <select name="tipo" class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="carro">Carro (Padrão)</option>
                            <option value="moto">Moto</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">RENAVAM</label>
                        <input type="text" name="renavam" placeholder="00000000000" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">PLACA</label>
                        <input type="text" name="placa" placeholder="ABC1D23" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">EXERCÍCIO</label>
                        <input type="text" name="exercicio" value="2025" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Nº CRV</label>
                        <input type="text" name="numero_crv" class="w-full border rounded p-2 uppercase" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-700 mb-1">MARCA / MODELO / VERSÃO</label>
                        <input type="text" name="marca_modelo" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">CHASSI</label>
                        <input type="text" name="chassi" class="w-full border rounded p-2 uppercase" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ANO FABRICAÇÃO</label>
                        <input type="text" name="ano_fabricacao" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ANO MODELO</label>
                        <input type="text" name="ano_modelo" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">COMBUSTÍVEL</label>
                        <input type="text" name="combustivel" value="ALCOOL/GASOLINA" class="w-full border rounded p-2 uppercase">
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 border-t pt-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">NOME DO PROPRIETÁRIO</label>
                        <input type="text" name="nome" class="w-full border rounded p-2 uppercase" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">CPF/CNPJ</label>
                        <input type="text" name="cpf_cnpj" class="w-full border rounded p-2 uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">LOCAL (CIDADE/UF)</label>
                        <input type="text" name="local" placeholder="SALVADOR BA" class="w-full border rounded p-2 uppercase" required>
                    </div>
                </div>

                <div class="flex justify-end border-t pt-6 gap-4">
                    <button type="reset" class="px-6 py-2 border rounded text-gray-600 hover:bg-gray-50">Limpar</button>
                    <button type="submit" class="px-8 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 shadow-lg transition">
                        <i class="fas fa-file-pdf mr-2"></i>GERAR DOCUMENTO AGORA
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-white border-t p-4 text-center text-xs text-gray-400">
        &copy; 2024 CH CONTAS - Sistema de Gerenciamento de Documentos
    </footer>
</body>
</html>
